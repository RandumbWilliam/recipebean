query GetRecipes {
  getRecipes {
    id
    recipeName
    servings
    prepTime
    cookTime
    recipeIngredient {
      order
      ingredient
      quantity
      unit
    }
    recipeInstruction {
      order
      instruction
    }
    recipeHeaderIngredient {
      order
      header
    }
    recipeHeaderInstruction {
      order
      header
    }
  }
}
