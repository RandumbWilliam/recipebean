query GetRecipes {
  getRecipes {
    id
    recipeName
    prepTime
    cookTime
    servings
    recipeIngredient {
      id
      order
      ingredient
      quantity
      unit
    }
    recipeInstruction {
      id
      order
      instruction
      step
    }
    recipeHeaderIngredient {
      id
      order
      header
    }
    recipeHeaderInstruction {
      id
      order
      header
    }
  }
}
